version: 2

snapshots:
  - name: Customer_snap
    description: "Snapshot of customer records."
    columns:
      - name: customer_id
        description: "Unique identifier for the customer."

      - name: cust_json
        description: "Raw customer JSON object."

      - name: _SOURCE_FILE
        description: "Source file from which the record was loaded."

      - name: _LOADED_AT
        description: "Timestamp when the record was ingested."

      - name: _BATCH_ID
        description: "dbt invocation batch identifier."

      - name: FILE_LAST_MODIFIED
        description: "Last modified timestamp of the source file."

